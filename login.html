 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AurionChain</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Prevents input from being wider than the card */
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #0d6efd;
        }

        /* The blue button with hover effect */
        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background-color: #0b5ed7; /* Darker blue on hover */
            transform: translateY(-1px); /* Slight lift effect */
        }

        .footer-links {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        /* Clean links without underlines */
        .footer-links a {
            text-decoration: none;
            color: #0d6efd;
            margin: 0 5px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .back-home {
            display: inline-block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<script src="script.js"></script>
<div class="login-card">
    <h2>Welcome Back</h2>
    <p>Please enter your details to login.</p>

    <form action="#">
        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>

        <button type="submit" class="login-btn">Log In</button>
    </form>

    <div class="footer-links">
        <span>Don't have an account?</span>
        <a href="joinnow.html">Join now</a>
    </div>

    <a href="index.html" class="back-home">← Back to Home</a>
</div>

</body>
</html>
